<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo</title>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <div class="echo-app">
      <header class="echo-header">
        <div class="echo-brand">
          <div class="echo-logo-dot" aria-hidden="true"></div>
          <div>
            <div class="echo-title">Echo</div>
            <div class="echo-subtitle">See the same AI, from every angle.</div>
          </div>
        </div>
      </header>

      <nav class="echo-nav" id="echo-nav" hidden>
        <button
          class="echo-nav-arrow"
          id="echo-prev"
          aria-label="Previous prompt"
        >
          ‹
        </button>
        <span class="echo-nav-count" id="echo-nav-count">1 / 1</span>
        <button
          class="echo-nav-arrow"
          id="echo-next"
          aria-label="Next prompt"
        >
          ›
        </button>
      </nav>

      <section
        class="echo-prompt-card"
        id="echo-prompt-card"
        hidden
      >
        <div class="echo-prompt-label">Captured prompt</div>
        <div class="echo-prompt-text" id="echo-prompt-box"></div>
      </section>

      <section class="echo-empty" id="echo-empty">
        <div class="echo-empty-title">Type a prompt in ChatGPT</div>
        <div class="echo-empty-text">
          Echo auto-captures from the ChatGPT composer and runs it 4 ways
          against GPT-4o — the same model that powers ChatGPT — to score
          consistency with Claude.
        </div>
      </section>

      <section class="echo-body" id="echo-body" hidden>
        <div class="echo-score-card">
          <div class="echo-score-ring">
            <svg
              viewBox="0 0 120 120"
              width="120"
              height="120"
              aria-hidden="true"
            >
              <circle
                cx="60"
                cy="60"
                r="52"
                stroke="#1F1F1F"
                stroke-width="8"
                fill="none"
              />
              <circle
                id="echo-score-arc"
                class="echo-score-arc"
                cx="60"
                cy="60"
                r="52"
                stroke="currentColor"
                stroke-width="8"
                fill="none"
                stroke-linecap="round"
                stroke-dasharray="326"
                stroke-dashoffset="326"
                transform="rotate(-90 60 60)"
              />
            </svg>
            <div id="echo-score-num" class="echo-score-num">—</div>
          </div>
          <div class="echo-score-meta">
            <div class="echo-score-label">Consistency</div>
            <div id="echo-score-verdict" class="echo-score-verdict">
              Analyzing…
            </div>
          </div>
        </div>

        <nav class="echo-tabs" role="tablist">
          <button class="echo-tab is-active" data-tab="responses" role="tab">
            Responses
          </button>
          <button class="echo-tab" data-tab="contradictions" role="tab">
            Contradictions
          </button>
        </nav>

        <div class="echo-panel" data-panel="responses">
          <div id="echo-resp-list" class="echo-resp-list"></div>
        </div>
        <div class="echo-panel" data-panel="contradictions" hidden>
          <div id="echo-contr-list" class="echo-contr-list"></div>
        </div>
      </section>

      <footer class="echo-footer">
        <span id="echo-status" class="echo-status">ready</span>
        <span class="echo-powered">Claude + GPT-4o</span>
      </footer>
    </div>

    <script src="config.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
