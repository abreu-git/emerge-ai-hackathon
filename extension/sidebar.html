<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo</title>
    <link rel="preload" as="font" type="font/woff2" href="fonts/Inter-400.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="fonts/Inter-500.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="fonts/IBMPlexMono-600.woff2" crossorigin />
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <div class="echo-app">
      <img id="echo-site-badge" class="echo-site-badge" alt="" hidden />
      <!-- Captured prompt (top, always visible once there's a prompt) -->
      <section class="echo-prompt-card" id="echo-prompt-card" hidden>
        <div class="echo-prompt-label">Captured prompt</div>
        <div class="echo-prompt-text" id="echo-prompt-box"></div>
      </section>

      <!-- Empty state (hero) -->
      <section class="echo-empty" id="echo-empty">
        <h1 class="echo-empty-title" id="echo-empty-title">Your AI is nicer than it should be.</h1>
        <p class="echo-empty-text" id="echo-empty-text">
          Echo asks ChatGPT the same question three different ways.
          If the answer drifts, you'll see it.
        </p>
      </section>

      <!-- Carousel: dots above + horizontal scroll-snap track -->
      <div class="echo-carousel" id="echo-carousel" hidden>
        <div class="echo-dots" id="echo-dots" role="tablist" aria-label="Responses"></div>
        <main class="echo-cards" id="echo-cards"></main>
      </div>

      <!-- Consistency footer bar (clickable → opens report drawer) -->
      <button
        class="echo-footer-bar"
        id="echo-footer-bar"
        type="button"
        hidden
        aria-label="Open consistency report"
      >
        <div class="echo-footer-row">
          <span class="echo-footer-label">Consistency</span>
          <span class="echo-footer-score" id="echo-footer-score">—</span>
        </div>
        <div class="echo-footer-bar-track" aria-hidden="true">
          <div class="echo-footer-bar-fill" id="echo-footer-bar-fill"></div>
        </div>
        <div class="echo-footer-hint">
          Tap for full report <span class="arrow" aria-hidden="true">→</span>
        </div>
      </button>

      <!-- Report drawer (slides up when footer is tapped) -->
      <aside
        class="echo-drawer"
        id="echo-drawer"
        hidden
        aria-hidden="true"
      >
        <header class="echo-drawer-header">
          <div class="echo-drawer-title-block">
            <div class="echo-drawer-label">Consistency</div>
            <div class="echo-drawer-score-row">
              <div class="echo-drawer-score" id="echo-drawer-score">—</div>
              <div class="echo-drawer-rec" id="echo-drawer-recommendation" hidden></div>
            </div>
          </div>
          <button
            class="echo-drawer-close"
            id="echo-drawer-close"
            aria-label="Close report"
          >
            ×
          </button>
        </header>
        <div class="echo-drawer-body">
          <div class="echo-drawer-section">
            <div class="echo-drawer-section-label">Verdict</div>
            <div class="echo-drawer-verdict" id="echo-drawer-verdict"></div>
          </div>
          <div class="echo-drawer-section">
            <div class="echo-drawer-section-label">Stances</div>
            <div class="echo-drawer-stances" id="echo-drawer-stances"></div>
          </div>
          <div class="echo-drawer-section">
            <div class="echo-drawer-section-label">
              Contradictions
              <span class="echo-drawer-section-count" id="echo-drawer-contr-count"></span>
            </div>
            <div class="echo-drawer-contradictions" id="echo-drawer-contradictions"></div>
          </div>
        </div>
      </aside>

      <!-- Status line (bottom) -->
      <div class="echo-status-line">
        <span id="echo-status" class="echo-status">ready</span>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
