<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo</title>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <div class="echo-app">
      <header class="echo-header">
        <div class="echo-brand">
          <div class="echo-logo-dot" aria-hidden="true"></div>
          <div>
            <div class="echo-title">Echo</div>
            <div class="echo-subtitle">See the same AI, from every angle.</div>
          </div>
        </div>
      </header>

      <!-- Captured prompt (top, always visible once there's a prompt) -->
      <section class="echo-prompt-card" id="echo-prompt-card" hidden>
        <div class="echo-prompt-label">Captured prompt</div>
        <div class="echo-prompt-text" id="echo-prompt-box"></div>
      </section>

      <!-- Empty state -->
      <section class="echo-empty" id="echo-empty">
        <div class="echo-empty-title">Type a prompt in ChatGPT</div>
        <div class="echo-empty-text">
          Echo auto-captures from the ChatGPT composer and runs 4 parallel
          calls against GPT-4o to score consistency with Claude.
        </div>
      </section>

      <!-- Response cards scroll area -->
      <main class="echo-cards" id="echo-cards" hidden></main>

      <!-- Consistency footer bar (clickable → opens report drawer) -->
      <button
        class="echo-footer-bar"
        id="echo-footer-bar"
        type="button"
        hidden
        aria-label="Open consistency report"
      >
        <div class="echo-footer-row">
          <span class="echo-footer-label">Consistency</span>
          <span class="echo-footer-score" id="echo-footer-score">—</span>
        </div>
        <div class="echo-footer-bar-track" aria-hidden="true">
          <div class="echo-footer-bar-fill" id="echo-footer-bar-fill"></div>
        </div>
        <div class="echo-footer-hint">Tap for full report</div>
      </button>

      <!-- Report drawer (slides up when footer is tapped) -->
      <aside
        class="echo-drawer"
        id="echo-drawer"
        hidden
        aria-hidden="true"
      >
        <header class="echo-drawer-header">
          <div>
            <div class="echo-drawer-label">Consistency report</div>
            <div class="echo-drawer-score" id="echo-drawer-score">—</div>
          </div>
          <button
            class="echo-drawer-close"
            id="echo-drawer-close"
            aria-label="Close report"
          >
            ×
          </button>
        </header>
        <div class="echo-drawer-body">
          <div class="echo-drawer-section">
            <div class="echo-drawer-section-label">Verdict</div>
            <div class="echo-drawer-verdict" id="echo-drawer-verdict"></div>
          </div>
          <div class="echo-drawer-section">
            <div class="echo-drawer-section-label">Recommendation</div>
            <div class="echo-drawer-recommendation" id="echo-drawer-recommendation"></div>
          </div>
          <div class="echo-drawer-section">
            <div class="echo-drawer-section-label">Stances</div>
            <div class="echo-drawer-stances" id="echo-drawer-stances"></div>
          </div>
          <div class="echo-drawer-section">
            <div class="echo-drawer-section-label">Contradictions</div>
            <div class="echo-drawer-contradictions" id="echo-drawer-contradictions"></div>
          </div>
        </div>
      </aside>

      <!-- Minimal status line (replaces old footer) -->
      <div class="echo-status-line">
        <span id="echo-status" class="echo-status">ready</span>
        <span class="echo-powered">Claude + GPT-4o</span>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
